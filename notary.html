<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Notary Central NJ | Same-Day Notarization | VirtuElegance Solutions</title>
    <meta name="description"
        content="Fast and reliable mobile notary services in Central New Jersey. We come to you in Middlesex, Somerset, and Mercer counties. Same-day appointments available.">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 900: '#065F46', 800: '#044e39' },
                        gold: { 500: '#D97706', 400: '#fbbf24' },
                        ivory: { 50: '#FEFEF9', 100: '#FAFAF7' },
                        mint: { 50: '#F0FDF4', 100: '#ECFDF5' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FEFEF9;
            color: #374151;
        }

        .mint-gradient {
            background: linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 100%);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="antialiased font-sans bg-ivory-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);

            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const navLinks = [
                { name: 'Home', href: 'index.html' },
                { name: 'Virtual Assistant', href: 'virtual-assistant.html' },
                { name: 'Mobile Notary', href: 'notary.html' },
                { name: 'Officiant', href: 'officiant.html' },
                { name: 'Reviews', href: 'index.html#reviews' },
                { name: 'Contact', href: 'index.html#contact' }
            ];

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 80);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="flex flex-col min-h-screen">
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-ivory-100/95 backdrop-blur-sm shadow-md py-4' : 'bg-transparent py-4 sm:py-6'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-emerald-900">
                            <div className="flex justify-between items-center">
                                <a href="index.html" className="flex items-center space-x-3 group cursor-pointer">
                                    <img src="logo.jpg" alt="VirtuElegance Solutions" className="h-10 w-auto rounded-md" />
                                    <div className="flex flex-col text-left">
                                        <span className="font-serif text-xl font-bold text-[#D97706] leading-none">VirtuElegance</span>
                                        <span className="text-emerald-900 font-sans font-light text-[10px] tracking-widest uppercase mb-0.5">Solutions</span>
                                        <span className="text-[8px] text-emerald-900/60 font-medium uppercase tracking-tighter">Serving Central New Jersey</span>
                                    </div>
                                </a>
                                <div className="hidden md:flex space-x-8 items-center">
                                    {navLinks.map(link => {
                                        const isActive = window.location.pathname.includes(link.href);
                                        return (
                                            <a
                                                key={link.name}
                                                href={link.href}
                                                className={`text-xs font-bold uppercase tracking-widest hover:text-gold-500 transition-colors relative group py-2 ${isScrolled ? 'text-gray-800' : 'text-emerald-900'}`}
                                            >
                                                {link.name}
                                                <span className={`absolute bottom-0 left-0 h-0.5 bg-gold-500 transition-all duration-300 rounded-full ${isActive ? 'w-full' : 'w-0 group-hover:w-full'}`}></span>
                                            </a>
                                        );
                                    })}
                                    <a href="index.html#contact" className="bg-emerald-900 hover:bg-gold-500 text-ivory-50 px-6 py-2.5 rounded-full text-xs sm:text-sm font-bold transition-all shadow-md active:scale-95 uppercase tracking-wider">
                                        Book a mobile notary
                                    </a>
                                </div>
                                <div className="md:hidden">
                                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-emerald-900">
                                        <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            {isMobileMenuOpen ? (
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            ) : (
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                            )}
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        {isMobileMenuOpen && (
                            <div className="md:hidden bg-ivory-100 text-gray-800 shadow-2xl absolute w-full left-0 mt-4 py-8 px-4 flex flex-col space-y-4 border-b border-gray-100 animate-in fade-in slide-in-from-top-4 duration-300">
                                {navLinks.map((link) => (
                                    <a
                                        key={link.name}
                                        href={link.href}
                                        className="block px-3 py-3 rounded-md text-base font-bold text-gray-700 hover:text-emerald-900 hover:bg-emerald-50 transition-colors uppercase tracking-wider"
                                        onClick={() => setIsMobileMenuOpen(false)}
                                    >
                                        {link.name}
                                    </a>
                                ))}
                                <a href="index.html#contact" className="bg-emerald-900 text-white font-bold py-4 rounded-xl text-center shadow-lg active:scale-95 transition-transform uppercase tracking-wider text-sm">
                                    Book a mobile notary
                                </a>
                            </div>
                        )}
                    </nav>

                    <section className="pt-32 pb-20 mint-gradient">
                        <div className="max-w-5xl mx-auto px-4 text-center">
                            <h1 className="font-serif text-4xl md:text-6xl font-bold text-emerald-900 mb-6 text-balance">Mobile Notary Public in Central New Jersey (Same-Day Availability)</h1>
                            <p className="text-xl text-gray-600 font-light max-w-2xl mx-auto">Professional, reliable notarization at your doorstep. We travel to you, so you don't have to wait.</p>
                        </div>
                    </section>

                    <section className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-2 gap-16 items-start">
                            <div className="space-y-8">
                                <div className="p-8 bg-ivory-100 rounded-3xl border border-emerald-50">
                                    <h2 className="font-serif text-2xl font-bold text-emerald-900 mb-4">Counties We Serve</h2>
                                    <div className="flex flex-wrap gap-2">
                                        {["Middlesex", "Somerset", "Mercer", "Union (Partial)"].map((county, i) => (
                                            <span key={i} className="bg-emerald-900 text-white px-4 py-2 rounded-full text-sm font-bold">{county}</span>
                                        ))}
                                    </div>
                                    <p className="text-sm text-gray-500 mt-4 leading-relaxed">Available for appointments at homes, offices, hospitals, nursing homes, and local coffee shops.</p>
                                </div>

                                <div className="p-8 bg-white rounded-3xl border border-emerald-100 shadow-sm">
                                    <h3 className="font-serif text-2xl font-bold text-emerald-900 mb-4">Common Documents</h3>
                                    <ul className="grid grid-cols-2 gap-y-2 text-gray-600 text-sm font-light">
                                        <li>• Power of Attorney</li>
                                        <li>• Wills & Trusts</li>
                                        <li>• Real Estate Docs</li>
                                        <li>• Affidavits</li>
                                        <li>• Healthcare Proxies</li>
                                        <li>• Deeds & Mortgages</li>
                                    </ul>
                                </div>
                            </div>

                            <div className="space-y-8">
                                <div className="bg-emerald-50 p-10 rounded-3xl border border-emerald-100">
                                    <h2 className="font-serif text-2xl font-bold text-emerald-900 mb-6">What to Prepare</h2>
                                    <div className="space-y-6">
                                        <div className="flex items-start space-x-4">
                                            <div className="w-8 h-8 bg-emerald-900 text-white rounded-full flex shrink-0 items-center justify-center font-bold">1</div>
                                            <div>
                                                <h4 className="font-bold text-emerald-900">Valid Photo ID</h4>
                                                <p className="text-sm text-gray-600">Current government-issued ID (Driver's License, Passport).</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start space-x-4">
                                            <div className="w-8 h-8 bg-emerald-900 text-white rounded-full flex shrink-0 items-center justify-center font-bold">2</div>
                                            <div>
                                                <h4 className="font-bold text-emerald-900">Unsigned Documents</h4>
                                                <p className="text-sm text-gray-600">Documents must be signed in the physical presence of the notary.</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start space-x-4">
                                            <div className="w-8 h-8 bg-emerald-900 text-white rounded-full flex shrink-0 items-center justify-center font-bold">3</div>
                                            <div>
                                                <h4 className="font-bold text-emerald-900">All Parties Present</h4>
                                                <p className="text-sm text-gray-600">Ensure any witnesses or co-signers are present with IDs.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 bg-gold-500 rounded-3xl text-white">
                                    <h4 className="font-bold uppercase tracking-widest text-sm mb-2 opacity-80">Pricing Anchor</h4>
                                    <p className="text-lg font-serif">Mobile rates starting at $[X] + Statutorily set fee per signature.</p>
                                    <p className="text-xs mt-2 opacity-70">Travel fees vary by distance and time of day.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="py-20 bg-ivory-100 border-t border-gray-200">
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <h2 className="font-serif text-3xl font-bold text-emerald-900 mb-4">Hours of Operation</h2>
                            <p className="text-gray-600 mb-8">Monday – Friday: 9 AM - 6 PM | Saturday: By Appointment Only</p>
                            <div className="flex justify-center space-x-6">
                                <a href="tel:646-535-0085" className="bg-emerald-900 text-white px-8 py-4 rounded-full font-bold hover:bg-gold-500 transition-colors shadow-lg flex items-center">
                                    <svg className="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                    Book Notary Now
                                </a>
                            </div>
                        </div>
                    </section>

                    <footer className="bg-ivory-100 text-gray-600 py-16 border-t border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid md:grid-cols-4 gap-12 mb-12">
                                <div className="col-span-1 md:col-span-2 text-left">
                                    <div className="flex items-center space-x-3 mb-6">
                                        <img src="logo.jpg" alt="VirtuElegance Solutions" className="h-10 w-auto rounded-md" />
                                        <div className="flex flex-col">
                                            <span className="font-serif text-xl font-bold text-emerald-900 leading-none">VirtuElegance</span>
                                            <span className="text-emerald-900 font-sans font-light text-[10px] tracking-widest uppercase">Solutions</span>
                                        </div>
                                    </div>
                                    <p className="italic text-gold-500 font-medium mb-6">"Rooted in Service. Guided by Purpose."</p>
                                    <p className="text-gray-500 font-light max-w-sm">Professional mobile notary and concierge services across Central New Jersey milestones.</p>
                                </div>
                                <div className="text-left">
                                    <h4 className="font-serif text-emerald-900 font-bold mb-6">Quick Links</h4>
                                    <ul className="space-y-4 text-sm font-medium">
                                        {navLinks.map(link => (
                                            <li key={link.name}>
                                                <a href={link.href} className="hover:text-gold-500 transition-colors uppercase tracking-widest text-[10px]">{link.name}</a>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="text-left">
                                    <h4 className="font-serif text-emerald-900 font-bold mb-6">Contact & Area</h4>
                                    <ul className="space-y-4 text-sm font-light">
                                        <li className="flex items-center space-x-3">
                                            <svg className="w-5 h-5 text-gold-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                            <span className="text-emerald-900 font-medium">646-535-0085</span>
                                        </li>
                                        <li className="flex items-center space-x-3 text-gold-500 font-medium text-left">
                                            <svg className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                            <span className="text-xs">Commissioned in NJ | Middlesex, Somerset & Mercer</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <div className="pt-8 border-t border-gray-200">
                                <p className="text-xs text-gray-400 uppercase tracking-[0.2em]">© 2026 VirtuElegance Solutions. Serving Central New Jersey.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
