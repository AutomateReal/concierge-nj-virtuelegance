<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VirtuElegance Solutions | Rooted in Service. Guided by Purpose.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 900: '#065F46', 800: '#044e39' },
                        gold: { 500: '#D97706', 400: '#fbbf24' },
                        ivory: { 50: '#FEFEF9', 100: '#FAFAF7' },
                        mint: { 50: '#F0FDF4', 100: '#ECFDF5' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FEFEF9;
            color: #374151;
        }

        html {
            scroll-behavior: smooth;
        }

        .mint-gradient {
            background: linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 100%);
        }

        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-subtle {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes ring-subtle {
            0% {
                transform: rotate(0);
            }

            10% {
                transform: rotate(15deg);
            }

            20% {
                transform: rotate(-15deg);
            }

            30% {
                transform: rotate(10deg);
            }

            40% {
                transform: rotate(-10deg);
            }

            50% {
                transform: rotate(0);
            }

            100% {
                transform: rotate(0);
            }
        }

        @keyframes word-fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal-hidden {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .reveal-visible {
            animation: fadeInSlideUp 0.6s ease forwards;
        }

        .animate-pulse-subtle {
            animation: pulse-subtle 3s infinite ease-in-out;
        }

        .animate-ring {
            animation: ring-subtle 2s infinite ease-in-out;
        }

        [data-reveal] {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        [data-reveal].reveal-visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="antialiased font-sans bg-ivory-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('');
            const [currentReview, setCurrentReview] = useState(0);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 80);

                    // Track active section for navbar indicator
                    const sections = ['services', 'about', 'why-us', 'reviews', 'contact'];
                    let current = '';
                    const offset = 150; // Offset for better detection

                    for (const id of sections) {
                        const el = document.getElementById(id);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top <= offset && rect.bottom >= offset) {
                                current = id;
                                break;
                            }
                        }
                    }

                    if (current) setActiveSection(current);
                    else if (window.scrollY < 100) setActiveSection('');
                };

                window.addEventListener('scroll', handleScroll);

                // IntersectionObserver for reveal animations
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('reveal-visible');
                            entry.target.classList.remove('reveal-hidden');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('section').forEach(section => {
                    section.classList.add('reveal-hidden');
                    observer.observe(section);
                });

                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    observer.disconnect();
                };
            }, []);

            // Testimonial Carousel Auto-advance
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentReview(prev => (prev + 1) % reviews.length);
                }, 4000);
                return () => clearInterval(timer);
            }, [reviews.length]);

            const scrollTo = (id) => {
                setIsMobileMenuOpen(false);
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            const navLinks = [
                { name: 'Services', href: 'services' },
                { name: 'About', href: 'about' },
                { name: 'Why Us', href: 'why-us' },
                { name: 'Reviews', href: 'reviews' }
            ];

            const reviews = [
                { text: '"Ann truly transformed how I manage my small business. As a VA, she is impeccable with details and so incredibly proactive. I finally have time back in my day."', name: 'Sarah M.', location: 'Princeton, NJ' },
                { text: '"I needed a document notarized at the last minute and Ann came through instantly. Professional, warm, and highly convenient. Highly recommend her mobile notary service!"', name: 'David R.', location: 'Monmouth Junction, NJ' },
                { text: '"Ann officiated our vow renewal and it was nothing short of magical. She took the time to understand our love story and crafted a ceremony that felt completely us."', name: 'Jessica & Tom', location: 'New Brunswick, NJ' }
            ];

            return (
                <div className="flex flex-col min-h-screen">
                    {/* NAVIGATION */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-ivory-100/95 backdrop-blur-sm shadow-md py-4' : 'bg-transparent py-4 sm:py-6'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center">
                                <div className="flex-shrink-0 cursor-pointer flex items-center group" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                                    <div className="flex items-baseline">
                                        <span className="font-serif text-2xl sm:text-3xl font-bold text-[#D97706]">VirtuElegance</span>
                                        <span className="font-sans font-extralight text-lg sm:text-xl ml-1 transition-colors duration-300 text-emerald-900">Solutions</span>
                                        <span className="w-1.5 h-1.5 bg-[#D97706] rounded-full ml-1 md:ml-2"></span>
                                    </div>
                                </div>
                                <div className="hidden md:flex space-x-8 items-center">
                                    {navLinks.map(link => (
                                        <button
                                            key={link.name}
                                            onClick={() => scrollTo(link.href)}
                                            className={`text-sm font-medium hover:text-gold-500 transition-colors relative group py-2 ${isScrolled ? 'text-gray-800' : 'text-emerald-900'}`}
                                        >
                                            {link.name}
                                            <span className={`absolute bottom-0 left-0 h-1 bg-gold-500 transition-all duration-300 rounded-full ${activeSection === link.href ? 'w-full' : 'w-0 group-hover:w-full'}`}></span>
                                        </button>
                                    ))}
                                    <button onClick={() => scrollTo('contact')} className="bg-emerald-900 hover:bg-gold-500 text-ivory-50 px-5 py-2 rounded-full text-sm font-medium transition-colors shadow-sm active:scale-95">
                                        Contact Us
                                    </button>
                                </div>
                                <div className="md:hidden flex items-center">
                                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-emerald-900 hover:text-gold-500 focus:outline-none transition-transform active:scale-90">
                                        <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            {isMobileMenuOpen ? (
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            ) : (
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                            )}
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        {/* Mobile Menu */}
                        {isMobileMenuOpen && (
                            <div className="md:hidden bg-ivory-100 text-gray-800 shadow-2xl absolute w-full left-0 mt-4 py-6 px-4 flex flex-col space-y-4 border-b border-gray-100 animate-in fade-in slide-in-from-top-4 duration-300">
                                {navLinks.map(link => (
                                    <button key={link.name} onClick={() => scrollTo(link.href)} className={`text-left font-medium text-lg hover:text-emerald-900 transition-colors ${activeSection === link.href ? 'text-gold-500' : ''}`}>
                                        {link.name}
                                    </button>
                                ))}
                                <hr className="border-gray-200" />
                                <button onClick={() => scrollTo('contact')} className="bg-emerald-900 text-ivory-50 w-full py-4 rounded-full font-medium hover:bg-gold-500 transition-colors shadow-lg">
                                    Book a Free Consultation
                                </button>
                            </div>
                        )}
                    </nav>

                    {/* HERO */}
                    <section className="relative mint-gradient text-[#1C1917] min-h-screen flex items-center pt-24 overflow-hidden">
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">
                            <svg className="absolute w-full h-full opacity-30" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <pattern id="hero-pattern" width="100" height="100" patternUnits="userSpaceOnUse">
                                        <circle cx="50" cy="50" r="40" fill="none" stroke="#065F46" strokeWidth="0.5" opacity="0.1" />
                                        <circle cx="50" cy="50" r="20" fill="none" stroke="#D97706" strokeWidth="0.5" opacity="0.1" />
                                    </pattern>
                                </defs>
                                <rect width="100%" height="100%" fill="url(#hero-pattern)" />
                            </svg>
                        </div>
                        <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center text-center z-10 w-full py-12">
                            <span className="text-emerald-900 font-semibold tracking-wider uppercase text-sm mb-4 animate-[word-fade_0.6s_ease_forwards]">VirtuElegance Solutions</span>
                            <h1 className="font-serif text-5xl md:text-7xl lg:text-9xl font-bold tracking-tight mb-8 leading-tight">
                                {["Rooted", "in", "Service."].map((word, i) => (
                                    <span key={i} className="inline-block animate-[word-fade_0.6s_ease_forwards]" style={{ animationDelay: `${i * 0.1}s`, opacity: 0 }}>{word}&nbsp;</span>
                                ))}
                                <br />
                                <span className="text-gold-500 italic font-normal">
                                    {["Guided", "by", "Purpose."].map((word, i) => (
                                        <span key={i} className="inline-block animate-[word-fade_0.6s_ease_forwards]" style={{ animationDelay: `${(i + 3) * 0.1}s`, opacity: 0 }}>{word}&nbsp;</span>
                                    ))}
                                </span>
                            </h1>
                            <p className="max-w-2xl mx-auto text-lg md:text-2xl text-gray-600 font-light mb-10 leading-relaxed animate-[word-fade_0.6s_ease_forwards] delay-700" style={{ animationDelay: '0.7s', opacity: 0 }}>
                                Concierge Virtual Assistant · Mobile Notary · Officiant <br className="hidden md:block" /> serving Central New Jersey
                            </p>
                            <div className="animate-[word-fade_0.6s_ease_forwards]" style={{ animationDelay: '0.9s', opacity: 0 }}>
                                <button onClick={() => scrollTo('contact')} className="bg-emerald-900 hover:bg-gold-500 text-ivory-50 px-10 py-5 rounded-full text-lg font-medium transition-all transform hover:-translate-y-1 shadow-xl hover:shadow-2xl animate-pulse-subtle">
                                    Book a Free Consultation
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* SERVICES */}
                    <section id="services" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="font-serif text-4xl text-emerald-900 font-bold mb-4">Our Services</h2>
                                <div className="w-24 h-1 bg-gold-500 mx-auto rounded-full"></div>
                            </div>
                            <div className="grid md:grid-cols-3 gap-8">
                                {/* Card 1 */}
                                <div className="bg-ivory-50 rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 border-t-4 border-t-emerald-900 group hover:-translate-y-2 hover:border-ivory-100">
                                    <div className="bg-white w-16 h-16 rounded-full flex items-center justify-center mb-6 shadow-sm group-hover:scale-110 group-hover:bg-ivory-50 transition-all duration-300">
                                        <svg className="w-8 h-8 text-gold-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                        </svg>
                                    </div>
                                    <h3 className="font-serif text-2xl font-semibold text-gray-900 mb-4 group-hover:text-emerald-900 transition-colors">Concierge Virtual Assistant</h3>
                                    <p className="text-gray-600 font-light leading-relaxed">Administrative support, scheduling, inbox management, and more — so you can focus on what matters.</p>
                                </div>
                                {/* Card 2 */}
                                <div className="bg-ivory-50 rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 border-t-4 border-t-emerald-900 group hover:-translate-y-2 hover:border-ivory-100">
                                    <div className="bg-white w-16 h-16 rounded-full flex items-center justify-center mb-6 shadow-sm group-hover:scale-110 group-hover:bg-ivory-50 transition-all duration-300">
                                        <svg className="w-8 h-8 text-gold-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                    </div>
                                    <h3 className="font-serif text-2xl font-semibold text-gray-900 mb-4 group-hover:text-emerald-900 transition-colors">Mobile Notary Services</h3>
                                    <p className="text-gray-600 font-light leading-relaxed">I come to you. Fast, reliable notarization across Central New Jersey.</p>
                                </div>
                                {/* Card 3 */}
                                <div className="bg-ivory-50 rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 border-t-4 border-t-emerald-900 group hover:-translate-y-2 hover:border-ivory-100">
                                    <div className="bg-white w-16 h-16 rounded-full flex items-center justify-center mb-6 shadow-sm group-hover:scale-110 group-hover:bg-ivory-50 transition-all duration-300">
                                        <svg className="w-8 h-8 text-gold-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                        </svg>
                                    </div>
                                    <h3 className="font-serif text-2xl font-semibold text-gray-900 mb-4 group-hover:text-emerald-900 transition-colors">Wedding & Ceremony Officiant</h3>
                                    <p className="text-gray-600 font-light leading-relaxed">Personalized ceremonies for weddings, vow renewals, and more. Your moment, your way.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ABOUT */}
                    <section id="about" className="py-24 bg-ivory-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid lg:grid-cols-2 gap-16 items-center">
                                <div>
                                    <blockquote className="font-serif text-3xl md:text-4xl italic text-gold-500 leading-snug mb-8">
                                        "When climbing a good tree, you are given a push."
                                        <footer className="text-xl text-emerald-900 mt-4 not-italic font-sans">— Akan Proverb</footer>
                                    </blockquote>
                                    <div className="space-y-6 text-gray-600 font-light text-lg">
                                        <p>
                                            Hello, I'm Ann, the founder of VirtuElegance Solutions. I built this business on the simple but powerful idea that we go further when we lift each other up. My mission is to provide you with the support you need—whether that's organizing your business or officiating your most special moments.
                                        </p>
                                        <p>
                                            Based in Central New Jersey, I bring a purpose-driven approach to every service, combining high-level administrative expertise with warmth and personalized care. You provide the vision; I provide the push to help you climb.
                                        </p>
                                    </div>
                                </div>
                                <div className="relative">
                                    <div className="aspect-[4/5] bg-white p-4 rounded-[2rem] shadow-xl overflow-hidden relative group border border-gray-100">
                                        <img src="Ann.jpg" alt="Ann, Founder of VirtuElegance Solutions" className="w-full h-full object-cover rounded-[1.5rem]" />
                                    </div>
                                    <div className="absolute -bottom-8 -left-8 w-48 h-48 bg-gold-500 rounded-full opacity-10 blur-3xl -z-10"></div>
                                </div>
                            </div>
                        </div>
                    </section>
                    {/* WHY US */}
                    <section id="why-us" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="font-serif text-4xl text-emerald-900 font-bold mb-4">Why Choose VirtuElegance</h2>
                                <div className="w-24 h-1 bg-gold-500 mx-auto rounded-full"></div>
                            </div>
                            <div className="grid md:grid-cols-3 gap-12 text-center">
                                {/* Pillar 1 */}
                                <div className="p-8 bg-ivory-50 rounded-2xl border border-gray-100 shadow-sm">
                                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                                        <svg className="w-10 h-10 text-emerald-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                                        </svg>
                                    </div>
                                    <h3 className="font-serif text-2xl font-semibold mb-4 text-emerald-900">Detail-Oriented</h3>
                                    <p className="text-gray-600 font-light">Every task handled with precision, ensuring quality and peace of mind.</p>
                                </div>
                                {/* Pillar 2 */}
                                <div className="p-8 bg-ivory-50 rounded-2xl border border-gray-100 shadow-sm">
                                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                                        <svg className="w-10 h-10 text-emerald-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                    </div>
                                    <h3 className="font-serif text-2xl font-semibold mb-4 text-emerald-900">Flexible & Reliable</h3>
                                    <p className="text-gray-600 font-light">Available when you need support most, adapting to your specific needs.</p>
                                </div>
                                {/* Pillar 3 */}
                                <div className="p-8 bg-ivory-50 rounded-2xl border border-gray-100 shadow-sm">
                                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                                        <svg className="w-10 h-10 text-emerald-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                        </svg>
                                    </div>
                                    <h3 className="font-serif text-2xl font-semibold mb-4 text-emerald-900">Purpose-Driven</h3>
                                    <p className="text-gray-600 font-light">Deeply committed to helping your business grow and your events succeed.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* REVIEWS */}
                    <section id="reviews" className="py-24 bg-ivory-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="font-serif text-4xl text-emerald-900 font-bold mb-4">Client Kind Words</h2>
                                <div className="w-24 h-1 bg-gold-500 mx-auto rounded-full"></div>
                            </div>
                            <div className="relative overflow-hidden">
                                {/* Desktop Grid */}
                                <div className="hidden md:grid grid-cols-3 gap-8">
                                    {reviews.map((review, i) => (
                                        <div key={i} className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                                            <div className="flex text-gold-500 mb-4">
                                                {[...Array(5)].map((_, j) => (
                                                    <svg key={j} className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                                ))}
                                            </div>
                                            <p className="text-gray-600 font-light italic mb-6">{review.text}</p>
                                            <div>
                                                <p className="font-semibold text-emerald-900">— {review.name}</p>
                                                <p className="text-sm text-gray-400">{review.location}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Mobile Carousel */}
                                <div className="md:hidden relative px-4">
                                    <div className="overflow-hidden">
                                        <div className="flex transition-transform duration-500 ease-out" style={{ transform: `translateX(-${currentReview * 100}%)` }}>
                                            {reviews.map((review, i) => (
                                                <div key={i} className="w-full flex-shrink-0 px-2">
                                                    <div className="bg-white p-8 rounded-2xl shadow-md border border-gray-100">
                                                        <div className="flex text-gold-500 mb-4">
                                                            {[...Array(5)].map((_, j) => (
