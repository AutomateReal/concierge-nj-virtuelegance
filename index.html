    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 900: '#065F46', 800: '#044e39' },
                        gold: { 500: '#D97706', 400: '#fbbf24' },

    <style>
        body {
            background-color: #FEFEF9;
            color: #374151;
        }

        html {
            scroll-behavior: smooth;
        }

        .mint-gradient {
            background: linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 100%);
        }

        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-subtle {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes ring-subtle {
            0% {
                transform: rotate(0);
            }

            10% {
                transform: rotate(15deg);
            }

            20% {
                transform: rotate(-15deg);
            }

            30% {
                transform: rotate(10deg);
            }

            40% {
                transform: rotate(-10deg);
            }

            50% {
                transform: rotate(0);
            }

            100% {
                transform: rotate(0);
            }
        }

        @keyframes word-fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal-hidden {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .reveal-visible {
            animation: fadeInSlideUp 0.6s ease forwards;
        }

        .animate-pulse-subtle {
            animation: pulse-subtle 3s infinite ease-in-out;
        }

        .animate-ring {
            animation: ring-subtle 2s infinite ease-in-out;
        }

        [data-reveal] {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        [data-reveal].reveal-visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="antialiased font-sans bg-ivory-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const navLinks = [
            { name: 'Home', href: 'index.html' },
            { name: 'Virtual Assistant', href: 'virtual-assistant.html' },
            { name: 'Mobile Notary', href: 'notary.html' },
            { name: 'Officiant', href: 'officiant.html' },
            { name: 'Reviews', href: 'index.html#reviews' },
            { name: 'Contact', href: 'index.html#contact' }
        ];

        const reviews = [
            { text: '"Ann truly transformed how I manage my small business. As a VA, she is impeccable with details and so incredibly proactive. I finally have time back in my day."', name: 'Sarah M.', location: 'Princeton, NJ' },
            { text: '"I needed a document notarized at the last minute and Ann came through instantly. Professional, warm, and highly convenient. Highly recommend her mobile notary service!"', name: 'David R.', location: 'Monmouth Junction, NJ' },
            { text: '"Ann officiated our vow renewal and it was nothing short of magical. She took the time to understand our love story and crafted a ceremony that felt completely us."', name: 'Jessica & Tom', location: 'New Brunswick, NJ' }
        ];

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('');
            const [currentReview, setCurrentReview] = useState(0);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 80);

                    // Track active section for navbar indicator
                    const sections = ['services', 'about', 'why-us', 'reviews', 'contact'];
                    let current = '';
                    const offset = 150; // Offset for better detection

                    for (const id of sections) {
                        const el = document.getElementById(id);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top <= offset && rect.bottom >= offset) {
                                current = id;
                                break;
                            }
                        }
                    }

                    if (current) setActiveSection(current);
                    else if (window.scrollY < 100) setActiveSection('');
                };

                window.addEventListener('scroll', handleScroll);

                // IntersectionObserver for reveal animations
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('reveal-visible');
                            entry.target.classList.remove('reveal-hidden');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('section').forEach(section => {
                    section.classList.add('reveal-hidden');
                    observer.observe(section);
                });

                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    observer.disconnect();
                };
            }, []);

            // Testimonial Carousel Auto-advance
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentReview(prev => (prev + 1) % reviews.length);
                }, 4000);
                return () => clearInterval(timer);
            }, [reviews.length]);

            const scrollTo = (id) => {
                setIsMobileMenuOpen(false);
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };


            return (
                <div className="flex flex-col min-h-screen">
                    {/* NAVIGATION */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-ivory-100/95 backdrop-blur-sm shadow-md py-4' : 'bg-transparent py-4 sm:py-6'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center">
                                <a href="index.html" className="flex items-center space-x-3 group cursor-pointer">
                                    <img src="logo.jpg" alt="VirtuElegance Solutions – Central New Jersey" className="h-10 w-auto rounded-md shadow-sm group-hover:scale-105 transition-transform" />
                                    <div className="flex flex-col">
                                        <span className="font-serif text-xl font-bold text-[#D97706] leading-none">VirtuElegance</span>
                                        <span className="text-emerald-900 font-sans font-light text-[10px] tracking-widest uppercase mb-0.5">Solutions</span>
                                        <span className="text-[8px] text-emerald-900/60 font-medium uppercase tracking-tighter">Serving Central New Jersey</span>
                                    </div>
                                </a>
                                <div className="hidden md:flex space-x-8 items-center">
                                    {navLinks.map(link => {
                                        const isAnchorOnHome = link.href.includes('#');

                                        return (
                                            <a
                                                key={link.name}
                                                href={link.href}
                                                className={`text-xs font-bold uppercase tracking-widest hover:text-gold-500 transition-colors relative group py-2 ${isScrolled ? 'text-gray-800' : 'text-emerald-900'}`}
                                                onClick={(e) => {
                                                    if (link.href === 'index.html' && window.location.pathname.endsWith('index.html')) {
                                                        e.preventDefault();
                                                        window.scrollTo({ top: 0, behavior: 'smooth' });
                                                    } else if (isAnchorOnHome && window.location.pathname.endsWith('index.html')) {
                                                        e.preventDefault();
                                                        const id = link.href.split('#')[1];
                                                        scrollTo(id);
                                                    }
                                                }}
                                            >
                                                {link.name}
                                                <span className={`absolute bottom-0 left-0 h-0.5 bg-gold-500 transition-all duration-300 rounded-full ${(link.name === 'Home' && !window.location.hash) ||
                                                    (isAnchorOnHome && activeSection === link.href.split('#')[1])
                                                    ? 'w-full' : 'w-0 group-hover:w-full'
                                                    }`}></span>
                                            </a>
                                        );
                                    })}
                                    <button onClick={() => scrollTo('contact')} className="bg-emerald-900 hover:bg-gold-500 text-ivory-50 px-6 py-2.5 rounded-full text-xs sm:text-sm font-bold transition-all shadow-md active:scale-95 uppercase tracking-wider">
                                        Book a free consultation
                                    </button>
                                </div>
                                <div className="md:hidden flex items-center">
                                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-emerald-900 hover:text-gold-500 focus:outline-none transition-transform active:scale-90">

                                            {isMobileMenuOpen ? (

                                            ) : (
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                            )}
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        {/* Mobile Menu */}
                        {
                            isMobileMenuOpen && (

                                    <div className="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white border-b border-gray-100 shadow-xl">
                                        <div className="flex flex-col space-y-2 mb-4 p-2 bg-ivory-50 rounded-xl">
                                            <a href="tel:646-535-0085" className="flex items-center justify-center space-x-2 bg-emerald-900 text-white font-bold py-3 rounded-lg">
                                                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                                <span>Call Now</span>
                                            </a>
                                            <button onClick={() => { scrollTo('contact'); setIsMobileMenuOpen(false); }} className="bg-gold-500 text-white font-bold py-3 rounded-lg shadow-md active:scale-95 transition-transform uppercase tracking-wider text-sm">
                                                Book a free consultation
                                            </button>
                                        </div>
                                        {navLinks.map((link) => (
                                            <a
                                                key={link.name}
                                                href={link.href}
                                                className="block px-3 py-3 rounded-md text-base font-bold text-gray-700 hover:text-emerald-900 hover:bg-emerald-50 transition-colors uppercase tracking-wider"
                                                onClick={(e) => {
                                                    if (link.href.includes('#') && window.location.pathname.endsWith('index.html')) {
                                                        e.preventDefault();
                                                        setIsMobileMenuOpen(false);
                                                        scrollTo(link.href.split('#')[1]);
                                                    }
                                                }}
                                            >
                                                {link.name}
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            )
                        }
                    </nav >

                    {/* HERO */}
                    < section className="relative mint-gradient text-[#1C1917] min-h-screen flex items-center pt-24 overflow-hidden" >
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">

                                <defs>
                                    <pattern id="hero-pattern" width="100" height="100" patternUnits="userSpaceOnUse">

                            </p>

                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                        </svg>

                                </button>

                                <button onClick={() => scrollTo('notary-service')} className="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all border border-emerald-100 group text-left">
                                    <div className="text-gold-500 mb-3 group-hover:scale-110 transition-transform">
                                        <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />

                                <button onClick={() => scrollTo('officiant-service')} className="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all border border-emerald-100 group text-left">
                                    <div className="text-gold-500 mb-3 group-hover:scale-110 transition-transform">
                                        <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                        </svg>
                                    </div>
                                    <h3 className="font-serif text-xl font-bold text-emerald-900 mb-1">I need an Officiant</h3>
                                    <p className="text-xs text-gray-500">Personalized ceremonies for your day</p>
                                </button>
                            </div>

                            <div className="flex flex-col items-center animate-[word-fade_0.6s_ease_forwards]" style={{ animationDelay: '1.1s', opacity: 0 }}>

                                    Serving Central New Jersey | Response within 2 business hours
                                </div>
                                <div className="flex space-x-4">
                                    <button onClick={() => scrollTo('contact')} className="bg-emerald-900 hover:bg-gold-500 text-ivory-50 px-8 py-4 rounded-full text-lg font-medium transition-all transform hover:-translate-y-1 shadow-xl hover:shadow-2xl">
                                        Book a Free Consultation
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section >

                    {/* SERVICES */}
